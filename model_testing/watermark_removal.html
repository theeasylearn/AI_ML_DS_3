<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Removal AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .card {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border: none;
        }

        .preview-img {
            max-height: 380px;
            object-fit: contain;
            border: 3px solid #e9ecef;
            border-radius: 12px;
            background: #fff;
        }

        .result-box {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
        }

        .download-btn {
            font-size: 1.1rem;
        }
    </style>
</head>

<body class="py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">
                <i class="fas fa-magic"></i> Watermark Removal AI
            </h1>
            <p class="lead text-muted">Upload • Remove Watermark • Download Clean Image</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="card">
                    <div class="card-body p-5">

                        <!-- Upload -->
                        <div class="mb-4 text-center">
                            <input type="file" id="imageInput" accept="image/*"
                                class="form-control form-control-lg d-inline-block w-auto" required>
                        </div>

                        <!-- Images Row -->
                        <div class="row g-4" id="previewRow" style="display: none;">

                            <!-- Original -->
                            <div class="col-md-6">
                                <h5 class="text-center mb-3 text-danger">
                                    <i class="fas fa-image"></i> Original (Watermarked)
                                </h5>
                                <img id="originalImg" class="preview-img w-100" alt="Original Image">
                            </div>

                            <!-- Cleaned -->
                            <div class="col-md-6">
                                <h5 class="text-center mb-3 text-success">
                                    <i class="fas fa-sparkles"></i> Cleaned (No Watermark)
                                </h5>
                                <img id="cleanedImg" class="preview-img w-100" alt="Cleaned Image"
                                    style="display: none;">

                                <div id="loading" class="text-center py-5" style="display:none;">
                                    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;">
                                    </div>
                                    <h5>Removing watermark using U-Net...</h5>
                                    <p class="text-muted">This may take 5-15 seconds</p>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="text-center mt-4">
                            <button id="processBtn" class="btn btn-primary btn-lg px-5 me-3" disabled>
                                <i class="fas fa-magic"></i> Remove Watermark
                            </button>
                            <button id="resetBtn" class="btn btn-outline-secondary btn-lg px-4" style="display: none;">
                                <i class="fas fa-redo"></i> Reset
                            </button>
                        </div>

                        <!-- Download Button -->
                        <div class="text-center mt-3" id="downloadContainer" style="display: none;">
                            <a id="downloadBtn" class="btn btn-success btn-lg download-btn">
                                <i class="fas fa-download"></i> Download Cleaned Image
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "https://api-testing-3-f0v7.onrender.com/remove-watermark";

        // ... (keep all variables same)

        processBtn.addEventListener('click', async function () {
            const file = imageInput.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {  // 10MB limit
                alert("❌ File is too large. Max 10MB allowed.");
                return;
            }

            loading.style.display = 'block';
            cleanedImg.style.display = 'none';
            downloadContainer.style.display = 'none';
            processBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Server error');
                }

                currentCleanedBlob = await response.blob();

                // Check if image is blank (very small size)
                if (currentCleanedBlob.size < 1000) {
                    alert("⚠️ Received blank image from server. Try another image.");
                    return;
                }

                const imageUrl = URL.createObjectURL(currentCleanedBlob);
                cleanedImg.src = imageUrl;
                cleanedImg.style.display = 'block';
                downloadContainer.style.display = 'block';

            } catch (error) {
                alert("❌ Error: " + error.message);
                console.error(error);
            } finally {
                loading.style.display = 'none';
                processBtn.disabled = false;
            }
        });

        // Rest of the code remains same...
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
