<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Removal AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: none; }
        .preview-img { 
            max-height: 380px; 
            object-fit: contain; 
            border: 3px solid #e9ecef; 
            border-radius: 12px;
            background: #fff;
        }
        .result-box { background: #fff; border-radius: 12px; padding: 15px; }
        .download-btn { font-size: 1.1rem; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">
                <i class="fas fa-magic"></i> Watermark Removal AI
            </h1>
            <p class="lead text-muted">Upload • Remove Watermark • Download Clean Image</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="card">
                    <div class="card-body p-5">
                        
                        <!-- Upload -->
                        <div class="mb-4 text-center">
                            <input type="file" id="imageInput" accept="image/*" class="form-control form-control-lg d-inline-block w-auto" required>
                        </div>

                        <!-- Images Row -->
                        <div class="row g-4" id="previewRow" style="display: none;">
                            
                            <!-- Original -->
                            <div class="col-md-6">
                                <h5 class="text-center mb-3 text-danger">
                                    <i class="fas fa-image"></i> Original (Watermarked)
                                </h5>
                                <img id="originalImg" class="preview-img w-100" alt="Original Image">
                            </div>
                            
                            <!-- Cleaned -->
                            <div class="col-md-6">
                                <h5 class="text-center mb-3 text-success">
                                    <i class="fas fa-sparkles"></i> Cleaned (No Watermark)
                                </h5>
                                <img id="cleanedImg" class="preview-img w-100" alt="Cleaned Image" style="display: none;">
                                
                                <div id="loading" class="text-center py-5" style="display:none;">
                                    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                                    <h5>Removing watermark using U-Net...</h5>
                                    <p class="text-muted">This may take 5-15 seconds</p>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="text-center mt-4">
                            <button id="processBtn" class="btn btn-primary btn-lg px-5 me-3" disabled>
                                <i class="fas fa-magic"></i> Remove Watermark
                            </button>
                            <button id="resetBtn" class="btn btn-outline-secondary btn-lg px-4" style="display: none;">
                                <i class="fas fa-redo"></i> Reset
                            </button>
                        </div>

                        <!-- Download Button -->
                        <div class="text-center mt-3" id="downloadContainer" style="display: none;">
                            <a id="downloadBtn" class="btn btn-success btn-lg download-btn">
                                <i class="fas fa-download"></i> Download Cleaned Image
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api-testing-3-f0v7.onrender.com/remove-watermark"; // ← CHANGE THIS

        const imageInput = document.getElementById('imageInput');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewRow = document.getElementById('previewRow');
        const originalImg = document.getElementById('originalImg');
        const cleanedImg = document.getElementById('cleanedImg');
        const loading = document.getElementById('loading');
        const downloadContainer = document.getElementById('downloadContainer');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentCleanedBlob = null;

        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImg.src = e.target.result;
                    previewRow.style.display = 'flex';
                    processBtn.disabled = false;
                    resetBtn.style.display = 'inline-block';
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        processBtn.addEventListener('click', async function() {
            const file = imageInput.files[0];
            if (!file) return;

            // Reset UI
            loading.style.display = 'block';
            cleanedImg.style.display = 'none';
            downloadContainer.style.display = 'none';
            processBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Server error');

                currentCleanedBlob = await response.blob();
                const imageUrl = URL.createObjectURL(currentCleanedBlob);
                
                cleanedImg.src = imageUrl;
                cleanedImg.style.display = 'block';
                downloadContainer.style.display = 'block';

            } catch (error) {
                alert("❌ Error: " + error.message + "\n\nCheck if your API is running.");
            } finally {
                loading.style.display = 'none';
                processBtn.disabled = false;
            }
        });

        // Download
        downloadBtn.addEventListener('click', function() {
            if (currentCleanedBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(currentCleanedBlob);
                link.download = 'cleaned_image_' + Date.now() + '.png';
                link.click();
            }
        });

        // Reset
        resetBtn.addEventListener('click', function() {
            imageInput.value = '';
            previewRow.style.display = 'none';
            cleanedImg.style.display = 'none';
            downloadContainer.style.display = 'none';
            processBtn.disabled = true;
            resetBtn.style.display = 'none';
            currentCleanedBlob = null;
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
